<svg width="1200" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3366cc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2651a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  
  <!-- الخلفية الرئيسية -->
  <rect width="1200" height="250" fill="url(#mainGrad)"/>
  
  <!-- أشكال هندسية عائمة -->
  <circle cx="150" cy="50" r="80" fill="rgba(255,255,255,0.08)" filter="url(#blur)"/>
  <circle cx="1050" cy="200" r="100" fill="rgba(255,255,255,0.06)" filter="url(#blur)"/>
  <circle cx="600" cy="-30" r="120" fill="rgba(255,255,255,0.05)" filter="url(#blur)"/>
  
  <!-- مربعات مائلة -->
  <g transform="translate(200, 150) rotate(45)">
    <rect width="60" height="60" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  </g>
  
  <g transform="translate(1000, 80) rotate(-30)">
    <rect width="80" height="80" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  </g>
  
  <!-- خطوط ديكوريشن -->
  <line x1="50" y1="180" x2="150" y2="180" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
  <line x1="1100" y1="60" x2="1200" y2="60" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- نقاط تفاعلية -->
  <circle cx="300" cy="30" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="500" cy="200" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="900" cy="150" r="5" fill="rgba(255,255,255,0.25)"/>
  
  <!-- موجات -->
  <path d="M0,200 Q300,150 600,200 T1200,200 L1200,250 L0,250 Z" fill="rgba(255,255,255,0.05)"/>
  <path d="M0,210 Q300,170 600,210 T1200,210 L1200,250 L0,250 Z" fill="rgba(255,255,255,0.03)"/>
  
  <!-- نص ديكوريشن في الخلفية -->
  <text x="100" y="120" font-size="60" font-weight="bold" fill="rgba(255,255,255,0.02)" font-family="Arial">CODE</text>
  <text x="1000" y="220" font-size="50" font-weight="bold" fill="rgba(255,255,255,0.02)" font-family="Arial">LEARN</text>
</svg>
